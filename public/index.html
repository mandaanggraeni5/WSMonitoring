<!DOCTYPE html>
<html>
<head>
<title>Screen Monitoring</title>

<style>

body{
background:#000;
color:white;
text-align:center;
font-family:sans-serif;
}

#video{
width:720px;
height:1280px;
background:black;
}

</style>

</head>

<body>

<h2>Live Screen</h2>

<canvas id="video"></canvas>

<script src="https://cdn.jsdelivr.net/npm/broadway-player@1.0.0/Player.js"></script>

<script>

let player = new Player({
    useWorker:true,
    reuseMemory:true,
    webgl:true
})

document.body.appendChild(player.canvas)

let ws = new WebSocket("wss://wsmonitoring-production.up.railway.app")

ws.binaryType = "arraybuffer"

ws.onmessage = function(event){

    let data = new Uint8Array(event.data)

    player.decode(data)

}

</script>

</body>
</html>
